<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيت الأطفال - Children's House</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            direction: rtl;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .booklet-container {
            width: 100%;
            max-width: 900px;
            perspective: 1000px;
        }

        .book {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            display: flex;
            height: 600px;
            overflow: hidden;
            position: relative;
        }

        .left-page, .right-page {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-right: 1px solid #e0e0e0;
            position: relative;
        }

        .left-page {
            background: linear-gradient(to right, #f9f9f9, white);
            border-right: 2px solid #d0d0d0;
        }

        .right-page {
            background: white;
            border-right: none;
            border-left: 2px solid #d0d0d0;
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .arabic-text {
            font-size: 48px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 40px;
            line-height: 1.6;
            font-family: 'Arial', 'Tahoma', sans-serif;
        }

        .english-translation {
            font-size: 16px;
            color: #7f8c8d;
            font-style: italic;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .word-for-word {
            font-size: 13px;
            color: #95a5a6;
            font-style: italic;
            line-height: 1.6;
        }

        .page-number {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #bdc3c7;
            font-style: italic;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-counter {
            font-size: 16px;
            color: white;
            font-weight: bold;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .book {
                height: 500px;
                flex-direction: column;
            }

            .left-page, .right-page {
                padding: 40px 30px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }

            .right-page {
                border-left: none;
            }

            .arabic-text {
                font-size: 36px;
            }

            .english-translation {
                font-size: 14px;
            }

            .word-for-word {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="booklet-container">
        <h1 class="title">📖 بيت الأطفال 📖<br><small style="font-size: 20px;">Children's House</small></h1>
        
        <div class="book">
            <div class="left-page">
                <div class="page-content active"></div>
            </div>
            <div class="right-page">
                <div class="page-content active"></div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="previousPage()">◄ السابق</button>
            <span class="page-counter"><span id="currentPage">1</span> / 6</span>
            <button id="nextBtn" onclick="nextPage()">التالي ►</button>
        </div>
    </div>
